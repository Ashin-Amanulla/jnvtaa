# Used on the Lightsail host. Copy this file + a production .env next to each other.
# GitHub Actions sets BACKEND_IMAGE to your ECR URI:tag before pull/up.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    image: ${BACKEND_IMAGE}
    ports:
      - "${HOST_PORT:-80}:5454"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
